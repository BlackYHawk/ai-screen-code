version: '3.8'

# Usage:
# 1. Build and push images: ./deploy/build-and-push.sh
# 2. Pull and run: docker-compose pull && docker-compose up -d
#
# Or use specific version:
#   export IMAGE_TAG=20260301
#   docker-compose pull && docker-compose up -d

services:
  # Backend API service
  backend:
    # Use pre-built image from registry (change to your registry)
    image: ${DOCKER_REGISTRY:-docker.io}/${IMAGE_PREFIX:-your-dockerhub-username/ai-screen-code}-backend:${IMAGE_TAG:-latest}
    container_name: ai-screen-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRATION_DAYS=7

      # Server Configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080

      # OAuth Configuration
      - QQ_CLIENT_ID=${QQ_CLIENT_ID:-}
      - QQ_CLIENT_SECRET=${QQ_CLIENT_SECRET:-}
      - QQ_REDIRECT_URI=${QQ_REDIRECT_URI:-https://your-domain.com/auth/callback/qq}

      - WECHAT_CLIENT_ID=${WECHAT_CLIENT_ID:-}
      - WECHAT_CLIENT_SECRET=${WECHAT_CLIENT_SECRET:-}
      - WECHAT_REDIRECT_URI=${WECHAT_REDIRECT_URI:-https://your-domain.com/auth/callback/wechat}

      - DOUYIN_CLIENT_ID=${DOUYIN_CLIENT_ID:-}
      - DOUYIN_CLIENT_SECRET=${DOUYIN_CLIENT_SECRET:-}
      - DOUYIN_REDIRECT_URI=${DOUYIN_REDIRECT_URI:-https://your-domain.com/auth/callback/douyin}

      # Database (if using external database)
      - DATABASE_URL=${DATABASE_URL:-}

      # Email Configuration
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@your-domain.com}

      # AI Model API Keys
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}

    networks:
      - ai-screen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    # Use pre-built image from registry (change to your registry)
    image: ${DOCKER_REGISTRY:-docker.io}/${IMAGE_PREFIX:-your-dockerhub-username/ai-screen-code}-frontend:${IMAGE_TAG:-latest}
    container_name: ai-screen-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-screen-network
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}

networks:
  ai-screen-network:
    driver: bridge
