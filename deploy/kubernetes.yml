#阿里云 ACK Kubernetes 部署配置

apiVersion: v1
kind: Namespace
metadata:
  name: ai-screen-code
  labels:
    app: ai-screen-code

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-screen-backend
  namespace: ai-screen-code
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
      - name: backend
        image: registry.cn-hangzhou.aliyuncs.com/your-namespace/ai-screen-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: jwt-secret
        - name: QQ_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: qq-client-id
        - name: QQ_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: qq-client-secret
        - name: WECHAT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: wechat-client-id
        - name: WECHAT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: wechat-client-secret
        - name: DOUYIN_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: douyin-client-id
        - name: DOUYIN_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: douyin-client-secret
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: qwen-api-key
        - name: MINIMAX_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: minimax-api-key
        - name: KIMI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: kimi-api-key
        - name: GLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-screen-secrets
              key: glm-api-key
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: ai-screen-backend
  namespace: ai-screen-code
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: backend

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-screen-frontend
  namespace: ai-screen-code
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend
        image: registry.cn-hangzhou.aliyuncs.com/your-namespace/ai-screen-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

---
# Frontend Service (LoadBalancer for public access)
apiVersion: v1
kind: Service
metadata:
  name: ai-screen-frontend
  namespace: ai-screen-code
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-spec: "slb.s1.small"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: frontend

---
# Ingress (if using nginx-ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-screen-ingress
  namespace: ai-screen-code
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-screen-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-screen-frontend
            port:
              number: 80
  tls:
  - hosts:
    - your-domain.com
    secretName: ai-screen-tls-secret
