# AI Screen Code Backend Configuration

# Server Configuration
server:
  host: '0.0.0.0'
  port: 8080

# OAuth Configuration
oauth:
  # QQ OAuth2 Configuration
  # Documentation: https://wiki.open.qq.com/
  qq:
    client_id: '${QQ_CLIENT_ID:-}'
    client_secret: '${QQ_CLIENT_SECRET:-}'
    redirect_uri: '${QQ_REDIRECT_URI:-http://localhost:3000/auth/callback/qq}'
    scope: 'get_user_info'

  # WeChat OAuth2 Configuration
  # Documentation: https://developers.weixin.qq.com/doc/
  wechat:
    client_id: '${WECHAT_CLIENT_ID:-}'
    client_secret: '${WECHAT_CLIENT_SECRET:-}'
    redirect_uri: '${WECHAT_REDIRECT_URI:-http://localhost:3000/auth/callback/wechat}'
    scope: 'snsapi_login'

  # Douyin OAuth2 Configuration
  # Documentation: https://open.douyin.com/
  douyin:
    client_id: '${DOUYIN_CLIENT_ID:-}'
    client_secret: '${DOUYIN_CLIENT_SECRET:-}'
    redirect_uri: '${DOUYIN_REDIRECT_URI:-http://localhost:3000/auth/callback/douyin}'
    scope: 'user_info'

# JWT Configuration
jwt_secret: '${JWT_SECRET:-your-secret-key-change-in-production}'
jwt_expiration_days: 7

# Model API Keys Configuration
# 支持从环境变量读取: KIMI_API_KEY, KIMI_BASE_URL, KIMI_MODEL
# 或者直接填写配置
models:
  qwen:
    api_key: '${QWEN_API_KEY:-}'
    base_url: '${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}'
    default_model: '${QWEN_MODEL:-qwen-vl-max}'
    enabled: true

  minimax:
    api_key: '${MINIMAX_API_KEY:-}'
    base_url: '${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}'
    default_model: '${MINIMAX_MODEL:-MiniMax-VL01}'
    enabled: true

  kimi:
    api_key: '${KIMI_API_KEY:-}'
    base_url: '${KIMI_BASE_URL:-https://api.moonshot.cn/v1}'
    default_model: '${KIMI_MODEL:-moonshot-v1-vision-preview}'
    enabled: true

  glm:
    api_key: '${GLM_API_KEY:-}'
    base_url: '${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}'
    default_model: '${GLM_MODEL:-glm-4v}'
    enabled: true

# Logging Configuration
logging:
  level: 'info'
  format: 'json'

# CORS Configuration
cors:
  allowed_origins:
    - 'http://localhost:3000'
    - 'http://localhost:5173'
    - 'http://localhost:5174'
    - 'http://127.0.0.1:5173'
    - 'http://127.0.0.1:5174'
  allowed_methods:
    - 'GET'
    - 'POST'
    - 'PUT'
    - 'DELETE'
    - 'OPTIONS'
  allowed_headers:
    - 'Content-Type'
    - 'Authorization'
  allow_credentials: true

# Email/SMTP Configuration
email:
  smtp_host: '${SMTP_HOST:-}'
  smtp_port: 587
  smtp_user: '${SMTP_USER:-}'
  smtp_password: '${SMTP_PASSWORD:-}'
  from_email: '${SMTP_FROM:-noreply@example.com}'
  from_name: 'AI Screen Code'
